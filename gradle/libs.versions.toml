[versions]

# general
lombok = "1.18.38"
jda = "5.3.2"
spring = "3.4.4"
jackson = "2.18.2"

[libraries]

# general
lombok = { module = "org.projectlombok:lombok", version.ref = "lombok" }
jda = { module = "net.dv8tion:JDA", version.ref = "jda" }

# spring
spring-boot = { module = "org.springframework.boot:spring-boot-starter", version.ref = "spring" }
spring-boot-data-jpa = { module = "org.springframework.boot:spring-boot-starter-data-jpa", version.ref = "spring" }

# jackson
jackson = { group = "com.fasterxml.jackson.core", name = "jackson-databind", version.ref = "jackson" }
jackson-dataformat-yaml = { group = "com.fasterxml.jackson.dataformat", name = "jackson-dataformat-yaml", version.ref = "jackson" }

[plugins]

[bundles]

spring = [
    "spring-boot"
]

configuration = [
    "jackson",
    "jackson-dataformat-yaml"
]
name: Release build

on:
  release:
    types: [ created ]

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      name: ${{ steps.details.outputs.name }}
      version: ${{ steps.details.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Extract project details
        id: details
        run: |
          echo "name=$(grep 'rootProject.name' settings.gradle.kts | awk -F "=" '{print $2}' | tr -d ' \"\n')" >> $GITHUB_OUTPUT
          echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

  build:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: write
      checks: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: 25
          distribution: "temurin"
          check-latest: true

      - name: Build
        env:
          PUBLISH_USER: ${{ secrets.PUBLISH_USER }}
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
          VERSION: ${{ needs.prepare.outputs.version }}
          PUBLISH_REALM: release
        run: ./gradlew --no-daemon test build bootJar :yui-api:jar publish

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: Test results
          path: |
            **/build/test-results/test/*.xml
            **/build/reports/tests/test/

      - name: Test report
        if: ${{ !cancelled() }}
        uses: dorny/test-reporter@v3
        with:
          name: Gradle test report
          path: "**/build/test-results/test/*.xml"
          reporter: java-junit
          use-actions-summary: "true"
          list-suites: failed
          list-tests: failed
          fail-on-error: "false"

      - name: Create output directory
        run: mkdir output

      - name: Move API
        run: mv yui-api/build/libs/yui-api-${{ needs.prepare.outputs.version }}.jar output/${{ needs.prepare.outputs.name }}-API-${{ needs.prepare.outputs.version }}.jar

      - name: Move runtime jar
        run: mv build/libs/Yui.jar output/${{ needs.prepare.outputs.name }}-${{ needs.prepare.outputs.version }}.jar

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            output/${{ needs.prepare.outputs.name }}-API-${{ needs.prepare.outputs.version }}.jar
            output/${{ needs.prepare.outputs.name }}-${{ needs.prepare.outputs.version }}.jar
